name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac-x64
            os: macos-latest
            build_command: pnpm -C apps/desktop exec electron-builder --mac zip --x64 && pnpm -C apps/desktop exec electron-builder --mac dmg --x64
            artifact_name: desktop-release-mac-x64
            release_glob: |
              apps/desktop/release/**/*-Mac-x64-*.zip
              apps/desktop/release/**/*-Mac-x64-*.dmg
              apps/desktop/release/**/*-Mac-x64-*.blockmap
          - target: mac-arm64
            os: macos-latest
            build_command: pnpm -C apps/desktop exec electron-builder --mac zip --arm64 && pnpm -C apps/desktop exec electron-builder --mac dmg --arm64
            artifact_name: desktop-release-mac-arm64
            release_glob: |
              apps/desktop/release/**/*-Mac-arm64-*.zip
              apps/desktop/release/**/*-Mac-arm64-*.dmg
              apps/desktop/release/**/*-Mac-arm64-*.blockmap
          - target: windows-x64
            os: windows-latest
            build_command: pnpm -C apps/desktop exec electron-builder --win --x64
            artifact_name: desktop-release-windows-x64
            release_glob: |
              apps/desktop/release/**/*.exe
              apps/desktop/release/**/*.blockmap
          - target: linux-x64
            os: ubuntu-latest
            build_command: pnpm -C apps/desktop exec electron-builder --linux --x64
            artifact_name: desktop-release-linux-x64
            release_glob: apps/desktop/release/**/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-${{ matrix.target }}-electron-cache-${{ hashFiles('pnpm-lock.yaml', 'apps/desktop/electron-builder.json5', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-electron-cache-
            ${{ runner.os }}-electron-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync desktop app version from tag
        shell: bash
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "Using release version: ${RELEASE_VERSION}"
          node -e "const fs=require('fs');const p='apps/desktop/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n')" "${RELEASE_VERSION}"

      - name: Build renderer and electron bundles
        run: pnpm -C apps/desktop exec vite build && pnpm -C apps/desktop exec tsc

      - name: Warn when mac signing/notarization secrets are missing
        if: startsWith(matrix.target, 'mac-')
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing_signing=0
          if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            missing_signing=1
          fi

          missing_notarization=0
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
              missing_notarization=1
            fi
          fi

          if [ "${missing_signing}" -eq 1 ] || [ "${missing_notarization}" -eq 1 ]; then
            echo "::warning::macOS artifacts will be unsigned or unnotarized. Users may see Gatekeeper errors like 'app is damaged' unless quarantine is removed manually."
          fi

      - name: Package for target (with retry)
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          normalized_csc_link="${CSC_LINK:-}"
          if [ -n "${normalized_csc_link}" ]; then
            csc_path=""
            if [[ "${normalized_csc_link}" == file://* ]]; then
              csc_path="${normalized_csc_link#file://}"
            elif [[ "${normalized_csc_link}" == "." || "${normalized_csc_link}" == ".." || "${normalized_csc_link}" == /* || "${normalized_csc_link}" == ./* || "${normalized_csc_link}" == ../* ]]; then
              csc_path="${normalized_csc_link}"
            fi

            if [ -n "${csc_path}" ] && [ ! -f "${csc_path}" ]; then
              echo "::warning::Ignoring CSC_LINK because it points to a non-file path: ${csc_path}"
              unset CSC_LINK
              unset CSC_KEY_PASSWORD
            fi
          fi

          if [ -z "${CSC_LINK:-}" ]; then
            unset CSC_LINK
            unset CSC_KEY_PASSWORD
            if [[ "${{ matrix.target }}" == mac-* ]]; then
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              echo "macOS signing disabled for this run (CSC_LINK not configured)."
            else
              echo "Code signing disabled for this run (CSC_LINK not configured)."
            fi
          fi

          max_attempts=3
          attempt=1
          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Packaging attempt ${attempt}/${max_attempts}"
            if eval "${{ matrix.build_command }}"; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Packaging failed after ${max_attempts} attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/release/**/*
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_glob }}
          generate_release_notes: ${{ matrix.target == 'mac-x64' }}
